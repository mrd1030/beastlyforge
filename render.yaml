services:
  - type: web
    name: beastlyforge-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: beastlyforge
      - key: CORS_ORIGINS
        sync: false
