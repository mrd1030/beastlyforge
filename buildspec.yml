version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - cd frontend
      - npm install --frozen-lockfile

  pre_build:
    commands:
      - echo "Running pre-build checks..."
      - npm run build

  build:
    commands:
      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "Build finished at $(date)"

artifacts:
  files:
    - frontend/build/**/*
  name: beastlyforge-frontend-$(date +%Y-%m-%d)

cache:
  paths:
    - frontend/node_modules/**/*