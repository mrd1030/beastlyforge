version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== Installing Frontend Dependencies ==="
      - cd frontend
      - yarn install --frozen-lockfile

  build:
    commands:
      - echo "=== Building Frontend ==="
      - yarn build

  post_build:
    commands:
      - echo "Build completed successfully on `date`"
      - ls -la build

artifacts:
  files:
    - frontend/build/**/*
  name: beastlyforge-frontend
  discard-paths: no