version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
      python: 3.11
    commands:
      - echo "=== Installing Frontend ==="
      - cd frontend
      - yarn install --frozen-lockfile

      - echo "=== Installing Backend ==="
      - cd ../backend
      - pip install -r requirements.txt

  build:
    commands:
      - echo "=== Building Frontend ==="
      - cd ../frontend
      - yarn build

      - echo "=== Running Backend Tests ==="
      - cd ../backend
      - python -m pytest tests/ -v || echo "Tests completed (some may have warnings)"

  post_build:
    commands:
      - echo "Build completed on `date`"
      - ls -la frontend/build

artifacts:
  files:
    - frontend/build/**/*
  name: beastlyforge-build
  discard-paths: no
